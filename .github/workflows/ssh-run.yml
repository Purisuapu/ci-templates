name: SSH Run

on:
  workflow_call:
    inputs:
      script:
        description: 'Script bash a ejecutar en el servidor remoto'
        type: string
        required: true
      timeout:
        description: 'Tiempo máximo de ejecución del script (ej: 30m, 120m)'
        type: string
        default: '30m'
    secrets:
      SSH_PRIVATE_KEY:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 125

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Run remote command
        run: |
          for i in 1 2 3; do
            ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 \
              "${{ vars.DEPLOY_SSH_USER }}@${{ vars.SERVER_IP }}" \
              'bash -s' <<'REMOTE_SCRIPT' && break
          ${{ inputs.script }}
          REMOTE_SCRIPT
            [ $i -lt 3 ] && echo "Attempt $i failed, retrying in 15s..." && sleep 15 || exit 1
          done
