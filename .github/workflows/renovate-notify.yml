name: Renovate PR Notify

on:
  workflow_call:
    secrets:
      DISCORD_WEBHOOK:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 Renovate PR: ${{ github.event.pull_request.title }}\",
                \"description\": \"**Repo:** ${{ github.repository }}\n**PR:** ${{ github.event.pull_request.html_url }}\",
                \"color\": 3447003
              }]
            }"
