name: Restart

on:
  workflow_call:
    inputs:
      compose-name:
        description: 'Nombre del proyecto docker compose a reiniciar'
        type: string
        required: true
      notify-discord:
        description: 'Enviar notificación a Discord al terminar'
        type: boolean
        default: false
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      DISCORD_WEBHOOK:
        required: false

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Restart ${{ inputs.compose-name }}
        run: |
          for i in 1 2 3; do
            ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 \
              "${{ vars.DEPLOY_SSH_USER }}@${{ vars.SERVER_IP }}" \
              "docker compose -p ${{ inputs.compose-name }} restart" && break
            [ $i -lt 3 ] && echo "Attempt $i failed, retrying in 15s..." && sleep 15 || exit 1
          done

      - name: Notify Discord
        if: inputs.notify-discord && always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$EMOJI Restart ${{ inputs.compose-name }}\",
                \"description\": \"**Estado:** $STATUS\",
                \"color\": $COLOR
              }]
            }"
