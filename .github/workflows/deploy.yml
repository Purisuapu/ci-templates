name: Deploy

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Nombre del servicio (= nombre del repo, = directorio en el servidor)'
        type: string
        required: true
      deploy-path:
        description: 'Ruta absoluta en el servidor donde está el docker-compose.yml'
        type: string
        default: ''
      compose-file:
        description: 'Nombre del archivo docker-compose en el repo'
        type: string
        default: 'docker-compose.yaml'
      sync-files:
        description: 'Archivos adicionales del repo a copiar al servidor (separados por coma). El compose-file ya se copia siempre.'
        type: string
        default: ''
      environment:
        description: 'Entorno de despliegue (production / staging)'
        type: string
        default: 'production'
      notify-discord:
        description: 'Enviar notificación a Discord al terminar'
        type: boolean
        default: true
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      DISCORD_WEBHOOK:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set deploy path
        id: path
        run: |
          if [ -n "${{ inputs.deploy-path }}" ]; then
            echo "dir=${{ inputs.deploy-path }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=/opt/${{ inputs.service-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set files to sync
        id: files
        run: |
          if [ -n "${{ inputs.sync-files }}" ]; then
            echo "list=${{ inputs.compose-file }},${{ inputs.sync-files }}" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ inputs.compose-file }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Copy files to server
        run: |
          DIR="${{ steps.path.outputs.dir }}"
          HOST="${{ vars.SERVER_IP }}"
          USER="${{ vars.DEPLOY_SSH_USER }}"
          FILES=$(echo "${{ steps.files.outputs.list }}" | tr ',' ' ')
          for i in 1 2 3; do
            echo "SCP attempt $i..."
            scp -i ~/.ssh/deploy_key -o ConnectTimeout=15 $FILES "$USER@$HOST:$DIR/" && break
            [ $i -lt 3 ] && echo "Failed, retrying in 15s..." && sleep 15 || exit 1
          done

      - name: Deploy via SSH
        run: |
          DIR="${{ steps.path.outputs.dir }}"
          HOST="${{ vars.SERVER_IP }}"
          USER="${{ vars.DEPLOY_SSH_USER }}"
          for i in 1 2 3; do
            echo "SSH attempt $i..."
            ssh -i ~/.ssh/deploy_key -o ConnectTimeout=15 "$USER@$HOST" \
              "cd $DIR && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f" && break
            [ $i -lt 3 ] && echo "Failed, retrying in 15s..." && sleep 15 || exit 1
          done

      - name: Notify Discord
        if: inputs.notify-discord && always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$EMOJI Deploy ${{ inputs.service-name }}\",
                \"description\": \"**Repo:** ${{ github.repository }}\n**Branch:** ${{ github.ref_name }}\n**Commit:** $(echo ${{ github.sha }} | cut -c1-7)\n**Estado:** $STATUS\",
                \"color\": $COLOR
              }]
            }"
